<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terminal Access</title>
<style>
body{margin:0;padding:0;background:#1e1e2e;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh}
.card{background:#fff;border-radius:16px;padding:32px 28px;width:90%;max-width:400px;box-shadow:0 12px 40px rgba(0,0,0,.4);text-align:center}
h2{font-size:20px;font-weight:700;color:#111;margin-bottom:12px}
p{font-size:14px;color:#666;margin-bottom:24px}
.btn{display:inline-block;padding:14px 32px;background:#2F5AF3;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#1e42c9}
.btn:active{background:#1838a3}
.info{font-size:12px;color:#999;margin-top:20px;padding-top:20px;border-top:1px solid #eee}
</style>
</head>
<body>
<div class="card">
  <h2>Terminal Access</h2>
  <p>Click below to access the code-server terminal</p>
  <button class="btn" onclick="grantAccess()">Allow Access</button>
  <div class="info">This grants you a 24-hour session</div>
</div>

<script>
function grantAccess() {
  // Create session cookie directly
  const token = 'reset_' + Math.random().toString(36).substr(2, 9);
  document.cookie = `terex_sid=${token}; Path=/; Max-Age=86400; HttpOnly`;
  
  // Redirect to dashboard
  setTimeout(() => {
    window.location.href = '/dashboard';
  }, 500);
}
</script>
</body>
</html>
